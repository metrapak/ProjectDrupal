name: drupal-commerce
recipe: drupal11
config:
  webroot: web
  php: '8.4'
  composer_version: '2-latest'
  xdebug: debug
  drush: ^13
  database: mysql:8.4

services:
  appserver:
    build_as_root:
      - mkdir -p /app/web/sites/simpletest/browser_output
      - chmod -R 777 /app/web/sites/simpletest
      - chown -R www-data:www-data /app/web/sites/simpletest
    overrides:
      environment:
        DRUSH_OPTIONS_URI: "http://drupal-commerce.lndo.site/"

  phpmyadmin:
    type: phpmyadmin
    hosts:
      - database

proxy:
  appserver:
    - drupal-commerce.lndo.site
  phpmyadmin:
    - pma.drupal-commerce.lndo.site

tooling:
  drupal:
    service: appserver
    cmd: /app/vendor/bin/drupal --root=/app/web

  phpunit:
    service: appserver
    description: Run PHPUnit tests
    cmd: /app/vendor/bin/phpunit
